server:
  port: 8011
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8010/realms/nexora
          jwk-set-uri: http://localhost:8010/realms/nexora/protocol/openid-connect/certs
  cloud:
    gateway:
      discovery: # Enable Dynamic Discovery Routing 
        locator:
          enabled: true 
          lower-case-service-id: true 
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka